mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aipaint.entity

oss:
  endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
  accessKeyId: ${OSS_ACCESS_KEY_ID:}
  accessKeySecret: ${OSS_ACCESS_KEY_SECRET:}
  bucketName: ${OSS_BUCKET_NAME:lcj666}

jwt:
  secret: ${JWT_SECRET:DYCvcEKNY2GkbGlZ}
  expire: ${JWT_EXPIRE:86400}
  refresh-threshold: ${JWT_REFRESH_THRESHOLD:3600}

wechat:
  appid: ${WECHAT_APPID:}
  secret: ${WECHAT_SECRET:}

server:
  port: ${SERVER_PORT:48080}
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true