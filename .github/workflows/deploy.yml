name: Deploy via SCP

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 拉代码
        uses: actions/checkout@v3

      - name: 安装JDK
        uses: actions/setup-java@v3
        with:
          java-version: '8'

      - name: Maven打包
        run: mvn clean package -DskipTests

      - name: 上传Jar到服务器
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "target/ai-paint-backend-1.0-SNAPSHOT.jar"
          target: "/opt/ai-paint/app.jar"

      - name: 重启服务
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/ai-paint
            docker compose down
            docker compose up -d
